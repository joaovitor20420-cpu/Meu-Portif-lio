<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <!-- Dark deep background gradient -->
    <radialGradient id="novaBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#051412" />
      <stop offset="100%" stop-color="#020807" />
    </radialGradient>
    
    <!-- Neon Gradient for Beams -->
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0088ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.1"/>
    </linearGradient>
    
    <!-- Extreme Glow Filter -->
    <filter id="superGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subdued Glow -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
        <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
        </feMerge>
    </filter>
    
    <!-- Cyber Hexagon Grid Pattern -->
    <pattern id="hexGrid" width="60" height="103.923" patternUnits="userSpaceOnUse" patternTransform="scale(1.2)">
      <path d="M 60 25.981 L 60 77.942 L 30 95.263 L 0 77.942 L 0 25.981 L 30 8.66 Z" fill="none" stroke="#0088ff" stroke-width="0.5" stroke-opacity="0.06" />
    </pattern>
  </defs>

  <!-- Base Background -->
  <rect width="100%" height="100%" fill="url(#novaBg)" />
  
  <!-- Ambient Colored Orbs -->
  <circle cx="20%" cy="80%" r="500" fill="#0088ff" filter="blur(250px)" opacity="0.08" />
  <circle cx="85%" cy="20%" r="600" fill="#00d4ff" filter="blur(300px)" opacity="0.06" />

  <!-- Hexagonal Grid Overlay -->
  <rect width="100%" height="100%" fill="url(#hexGrid)" />

  <!-- Dynamic Diagonal Light Beams -->
  <g stroke="url(#neonGlow)" filter="url(#softGlow)" opacity="0.4">
    <line x1="-200" y1="1080" x2="1720" y2="0" stroke-width="1.5" />
    <line x1="-300" y1="900" x2="1620" y2="-180" stroke-width="0.5" opacity="0.6" />
    <line x1="-100" y1="1200" x2="1820" y2="120" stroke-width="4" opacity="0.3" />
    <!-- Cross beams -->
    <line x1="800" y1="-200" x2="2200" y2="1000" stroke-width="2" opacity="0.15" stroke="#0088ff"/>
  </g>

  <!-- Massive Typography "Full Stack Impact" -->
  <g id="parallax-bg-1" font-family="monospace" font-weight="900" fill="#0088ff" filter="url(#superGlow)">
    <text x="3%" y="30%" font-size="350" fill-opacity="0.12" transform="rotate(-15, 57, 324)">{</text>
    <text x="80%" y="60%" font-size="400" fill-opacity="0.10" transform="rotate(15, 1536, 648)">&lt;/&gt;</text>
    <text x="35%" y="90%" font-size="220" fill-opacity="0.05" transform="rotate(-5, 672, 972)">JS/TS</text>
  </g>

  <!-- High-Tech Circuit Data Lines -->
  <g id="parallax-bg-2" stroke="#0088ff" stroke-width="3" fill="none" filter="url(#superGlow)" opacity="0.7">
    <!-- Left to Center Circuit -->
    <path d="M 0 700 L 250 700 L 400 550 L 700 550" />
    <circle cx="700" cy="550" r="7" fill="#0088ff" />
    <circle cx="250" cy="700" r="4" fill="#0088ff" />
    <path d="M 250 700 L 350 800 L 500 800" stroke-width="1.5" stroke-opacity="0.5" />
    <circle cx="500" cy="800" r="4" fill="#0088ff" fill-opacity="0.5"/>
    
    <!-- Right to Center Circuit -->
    <path d="M 1920 350 L 1650 350 L 1500 500 L 1200 500" />
    <circle cx="1200" cy="500" r="7" fill="#0088ff" />
    <circle cx="1650" cy="350" r="4" fill="#0088ff" />
    <path d="M 1650 350 L 1550 250 L 1400 250" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="1400" cy="250" r="4" fill="#0088ff" fill-opacity="0.5"/>
  </g>

  <!-- Floating Glowing Code Lines -->
  <g id="parallax-bg-3" font-family="monospace" fill="#0088ff" font-size="28" font-weight="bold" filter="url(#softGlow)" opacity="0.75">
    <!-- Prominent "Full Stack" Object block -->
    <text x="12%" y="55%">const developer = {</text>
    <text x="15%" y="59%">name: "João Vitor",</text>
    <text x="15%" y="63%">role: "Full Stack",</text>
    <text x="15%" y="67%">stack: ["React", "Node", "TypeScript"]</text>
    <text x="12%" y="71%">};</text>
  </g>
  
  <g font-family="monospace" fill="#ffffff" font-size="20" opacity="0.3">
    <!-- Faded backend / DB snippet on the right -->
    <text x="70%" y="75%">export const innovate = async (req: Request) =&gt; {</text>
    <text x="72%" y="78%">const arch = await buildArchitecture();</text>
    <text x="72%" y="81%">return res.status(200).json(arch);</text>
    <text x="70%" y="84%">};</text>
  </g>
</svg>
